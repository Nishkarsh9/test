# Expires map
map $sent_http_content_type $expires {
    default off;
    text/html epoch;
    text/css max;
    application/javascript max;
    ~image/ max;
}

# --- Python TCP Port Reverse Proxy (Port 5000 Target) ---
server {
    listen 80;
    listen [::]:80;
    
    server_name _; 
    root /home/app/webapp/public;
    index index.html index.htm;

    client_max_body_size 10m;

    error_log /home/app/webapp/log/error.log warn;
    access_log /home/app/webapp/log/access.log timed_combined;

    # Intercept all incoming application endpoints
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_redirect off;

        # UPDATED: Routes directly to local loopback port 5000
        proxy_pass http://127.0.0.1:5000;
    }

    # Static optimization parameters
    location ~* \.(ico|jpg|gif|png|css|js|swf|html)$ {
        root /home/app/webapp/public;
        expires $expires;
        add_header Cache-Control "public, no-transform";
    }

    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }

    location ~ \.(aspx|asp) { return 404; }
    location ~ /\.ht { deny all; }
}
