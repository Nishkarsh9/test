# Expires map
map $sent_http_content_type $expires {
    default off;
    text/html epoch;
    text/css max;
    application/javascript max;
    ~image/ max;
}

# --- HTTP Server ---
server {
    listen 80;
    server_name stage-test.intrcity.com;
    root /home/app/webapp/public;
    index index.php index.html index.htm; # Added PHP index capability

    client_max_body_size 10m;

    error_log /home/app/webapp/log/error.log warn;
    access_log /home/app/webapp/log/access.log timed_combined;

    # Route normal traffic through index.php (Essential for modern PHP frameworks)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP scripts to PHP-FPM (Replaces Passenger engine)
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Since you are on PHP 5.6-fpm, it listens on port 9000 out-of-the-box by default
        fastcgi_pass 127.0.0.1:9000; 
        fastcgi_read_timeout 180;
    }

    # Static content optimization
    location ~* \.(ico|jpg|gif|png|css|js|swf|html)$ {
        expires $expires;
        add_header Cache-Control "public, no-transform";
    }

    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }

    location ~ /\.ht { deny all; }
}

# --- HTTPS Server ---
server {
    listen 443 ssl; 
    server_name stage-test.intrcity.com;

    ssl_certificate /etc/nginx/ssl/railyatri.in.chained.crt;
    ssl_certificate_key /etc/nginx/ssl/railyatri.key;

    root /home/app/webapp/public;
    index index.php index.html index.htm;

    error_log /home/app/webapp/log/error.log warn;
    access_log /home/app/webapp/log/access.log timed_combined;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP scripts to PHP-FPM
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_read_timeout 180;
    }

    location ~* \.(ico|jpg|gif|png|css|js|swf|html)$ {
        expires $expires;
    }

    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }

    # REMOVED: location ~ \.(php|aspx|asp) { return 404; } -> (Otherwise PHP would return 404)
    location ~ \.(aspx|asp) { return 404; } # Kept ASP protections intact
    location ~ /\.ht { deny all; }
}
